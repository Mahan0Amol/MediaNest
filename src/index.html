<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: https: http:; script-src 'self' 'unsafe-inline';" />
<title>MediaNest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <!-- <span class="brand-icon"> -->
        <img src="../icon.png" alt="MediaNest" class="brand-image" />
        <!-- </span> -->
        <span class="brand-name">MediaNest</span>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-view="dashboard"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h7v7H4z" /><path d="M13 4h7v5h-7z" /><path d="M13 11h7v9h-7z" /><path d="M4 13h7v7H4z" /></svg></span> <span class="nav-label" data-i18n="view.dashboard">داشبورد</span></button>
        <button class="nav-item" data-view="movies"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="2" /><path d="M9 9l5 3-5 3z" /></svg></span> <span class="nav-label" data-i18n="view.movies">فیلم‌ها</span></button>
        <button class="nav-item" data-view="shows"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="2" /><path d="M8 9h8" /><path d="M8 13h5" /></svg></span> <span class="nav-label" data-i18n="view.shows">سریال‌ها</span></button>
        <button class="nav-item" data-view="books"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6" /><path d="M16 4h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-2" /></svg></span> <span class="nav-label" data-i18n="view.books">کتاب‌ها</span></button>
        <button class="nav-item" data-view="settings"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3" /><path d="M19 12a7 7 0 0 0-.1-1.1l2-1.6-2-3.5-2.4 1a7.2 7.2 0 0 0-1.9-1.1L14 2h-4l-.6 2.8a7.2 7.2 0 0 0-1.9 1.1l-2.4-1-2 3.5 2 1.6a7 7 0 0 0 0 2.2l-2 1.6 2 3.5 2.4-1c.6.5 1.2.9 1.9 1.1L10 22h4l.6-2.8c.7-.2 1.3-.6 1.9-1.1l2.4 1 2-3.5-2-1.6c.1-.4.1-.7.1-1.1z" /></svg></span> <span class="nav-label" data-i18n="view.settings">تنظیمات</span></button>
      </nav>
      <div class="sidebar-footer">
        <span id="data-dir-hint"></span>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <h1 id="view-title">داشبورد</h1>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>
      <div id="view-container" class="view-container"></div>
    </main>
  </div>

  <!-- Generic Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-box"></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="renderer.js"></script>
</body>
</html>
